<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Turístico de Pitangui</title>

    <!-- Font Awesome (para ícones) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Photo Sphere Viewer CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/photo-sphere-viewer@4/dist/photo-sphere-viewer.min.css" />

    <!-- Nosso CSS personalizado -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Todo o seu conteúdo HTML (app-container, sidebar, map, modals ) permanece aqui -->
    <div id="app-container">
        <button id="menu-toggle"><i class="fa-solid fa-bars"></i></button>
        
        <aside id="sidebar">
            <header class="sidebar-header">
                <div class="header-icon-container">
                    <i class="fa-solid fa-map-location-dot header-icon"></i>
                </div>
                <div class="header-text">
                    <h2>Pontos Turísticos de Pitangui</h2>
                    <p>Explore as belezas da cidade</p>
                </div>
            </header>

            <div class="sidebar-content">
                <div class="locations-header">
                    <h3>Locais</h3>
                    <span id="locations-count">0 pontos turísticos</span>
                </div>
                <div class="search-container">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" id="search-box" placeholder="Buscar local...">
                    <button id="clear-search-btn"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <ul id="lista-locais">
                    <!-- Itens da lista serão inseridos aqui pelo JavaScript -->
                </ul>
            </div>
        </aside>

        <main id="map-container">
            <div id="map"></div>
        </main>
    </div>

    <!-- Modal para Imagem Ampliada (Lightbox) -->
    <div id="image-modal" class="modal">
        <span class="modal-close">&times;</span>
        <img class="modal-content" id="modal-image-content">
    </div>

    <!-- Container para o Visualizador 360 -->
    <div id="viewer-360-container">
        <button id="viewer-360-close">&times;</button>
        <div id="viewer-360"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- OverlappingMarkerSpiderfier para LEAFLET (A VERSÃO CORRETA ) -->
    <script src="https://cdn.jsdelivr.net/npm/overlapping-marker-spiderfier-leaflet@0.2.6/dist/oms.min.js"></script>
    
    <!-- Photo Sphere Viewer JS e dependências -->
    <script src="https://cdn.jsdelivr.net/npm/three/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/uevent@2/browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/photo-sphere-viewer@4/dist/photo-sphere-viewer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/photo-sphere-viewer@4/dist/plugins/gyroscope.min.js"></script>

    <!-- Nosso Script JS (com o DOMContentLoaded para garantir ) -->
    <script src="script.js"></script>
</body>
</html>
